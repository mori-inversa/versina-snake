<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Snake</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #13140e;
        font-family: 'JetBrains Mono', monospace;
        color: #f4f3e8;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #ui {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 12px;
        pointer-events: none;
      }
      h1 {
        margin: 0 0 4px;
        font-weight: 400;
        letter-spacing: 2px;
      }
      #score {
        font-size: 18px;
      }
      #hint {
        position: fixed;
        bottom: 12px;
        left: 0;
        right: 0;
        text-align: center;
        opacity: 0.6;
        font-size: 14px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui">
      <h1>SNAKE</h1>
      <div id="score">Score: 0</div>
    </div>
    <div id="hint">Arrow keys to move · R to restart</div>
    <script src="snake.js"></script>
  </body>
</html>
